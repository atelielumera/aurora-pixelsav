<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Black circle background -->
  <circle cx="100" cy="100" r="98" fill="#0a0a0a"/>
  <!-- Silver border -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#silver)" stroke-width="4"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#555" stroke-width="1"/>

  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4d4d4"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <!-- Red top face -->
    <linearGradient id="redFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </linearGradient>
    <!-- Blue left face -->
    <linearGradient id="blueFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4466ff"/>
      <stop offset="100%" stop-color="#1133cc"/>
    </linearGradient>
    <!-- Green right face -->
    <linearGradient id="greenFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33cc44"/>
      <stop offset="100%" stop-color="#007722"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="50%" stop-color="#c9973a"/>
      <stop offset="100%" stop-color="#f5d060"/>
    </linearGradient>
  </defs>

  <!-- Cube: top face (red) -->
  <polygon points="100,28 148,55 100,82 52,55" fill="url(#redFace)"/>
  <!-- Edge highlight top -->
  <polygon points="100,28 148,55 100,82 52,55" fill="none" stroke="#ff6666" stroke-width="0.5" opacity="0.5"/>

  <!-- Cube: left face (blue) -->
  <polygon points="52,55 100,82 100,136 52,109" fill="url(#blueFace)"/>
  <!-- Edge highlight left -->
  <polygon points="52,55 100,82 100,136 52,109" fill="none" stroke="#6688ff" stroke-width="0.5" opacity="0.5"/>

  <!-- Cube: right face (green) -->
  <polygon points="148,55 100,82 100,136 148,109" fill="url(#greenFace)"/>
  <!-- Edge highlight right -->
  <polygon points="148,55 100,82 100,136 148,109" fill="none" stroke="#55ee66" stroke-width="0.5" opacity="0.5"/>

  <!-- Cube internal edges -->
  <line x1="100" y1="82" x2="100" y2="136" stroke="#00000040" stroke-width="0.5"/>

  <!-- Golden star/compass bottom-right -->
  <g transform="translate(138, 142) scale(0.9)">
    <!-- Crescent arc -->
    <path d="M-18,18 A26,26 0 0,1 18,-18" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Main 4-point star -->
    <path d="M0,-22 L3,-3 L22,0 L3,3 L0,22 L-3,3 L-22,0 L-3,-3 Z" fill="url(#gold)"/>
    <!-- Small sparkles -->
    <circle cx="20" cy="-12" r="2.5" fill="url(#gold)"/>
    <circle cx="-6" cy="22" r="1.8" fill="url(#gold)"/>
    <circle cx="24" cy="8" r="1.5" fill="url(#gold)"/>
    <!-- Tiny dots -->
    <circle cx="14" cy="20" r="1.2" fill="#c9973a"/>
    <circle cx="-14" cy="-18" r="1" fill="#f5d060"/>
  </g>
</svg>
